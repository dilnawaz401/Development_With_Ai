<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Introduction</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .colorOne {
            color: red;
        }
        #colorTwo {
            color: blue;
        }
    </style>
</head>
<body>

    <p>Inline CSS</p>
    <p style="color: red; font-size: 20px;">This is a paragraph with inline CSS</p>
    

    <p>Internal CSS</p>
    <p class="colorOne">This is a paragraph with internal CSS</p>
    <p id="colorTwo">This is another paragraph with internal CSS</p>
