<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9efff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a0f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="400" height="500" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="350" cy="50" r="30" fill="#608cf0" opacity="0.1"/>
  <circle cx="50" cy="450" r="40" fill="#608cf0" opacity="0.08"/>
  <circle cx="380" cy="250" r="20" fill="#4a7fe8" opacity="0.12"/>
  
  <!-- Hair -->
  <path d="M 80 120 Q 60 80 100 60 Q 150 40 200 40 Q 250 40 300 60 Q 340 80 320 120 Z" fill="url(#hairGradient)"/>
  <circle cx="200" cy="100" r="85" fill="url(#hairGradient)"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="160" rx="70" ry="80" fill="#f4c2a0"/>
  
  <!-- Ears -->
  <ellipse cx="130" cy="160" rx="20" ry="35" fill="#f4c2a0"/>
  <ellipse cx="270" cy="160" rx="20" ry="35" fill="#f4c2a0"/>
  
  <!-- Eyes -->
  <circle cx="170" cy="140" r="8" fill="#333"/>
  <circle cx="230" cy="140" r="8" fill="#333"/>
  <circle cx="172" cy="138" r="3" fill="#fff"/>
  <circle cx="232" cy="138" r="3" fill="#fff"/>
  
  <!-- Eyebrows -->
  <path d="M 155 120 Q 170 115 185 120" stroke="#3d2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 215 120 Q 230 115 245 120" stroke="#3d2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 200 140 L 200 170" stroke="#d4a574" stroke-width="2" fill="none"/>
  
  <!-- Smile -->
  <path d="M 180 185 Q 200 205 220 185" stroke="#d4714f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Shirt/Body -->
  <path d="M 130 240 L 100 500 L 300 500 L 270 240 Q 200 260 130 240 Z" fill="#608cf0"/>
  
  <!-- Shirt collar detail -->
  <path d="M 170 240 L 160 260 L 200 270 L 240 260 L 230 240 Z" fill="#4a7fe8"/>
  
  <!-- Professional badge -->
  <circle cx="300" cy="80" r="40" fill="#608cf0"/>
  <text x="300" y="95" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">DEV</text>
  
  <!-- Stars accent -->
  <g fill="#ffc107" opacity="0.6">
    <polygon points="350,200 357,220 378,225 363,240 368,262 350,250 332,262 337,240 322,225 343,220"/>
    <polygon points="80,350 85,365 102,368 92,377 95,395 80,387 65,395 68,377 58,368 75,365"/>
  </g>
</svg>