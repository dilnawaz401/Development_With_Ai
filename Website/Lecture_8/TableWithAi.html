


<!DOCTYPE html> <!-- Declares the document type as HTML5 -->
<html lang="en"> <!-- Root element with language set to English -->
<head> <!-- Head section starts -->
    <meta charset="UTF-8"> <!-- Sets character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Table</title> <!-- Title of the web page -->
    <link rel="stylesheet" href="css/table-styles.css">
</head> <!-- Head section ends -->
<body> <!-- Body section starts -->

    <div> <!-- Container div for the table -->

        <h1>User Information</h1> <!-- Heading for the table -->

        <table> <!-- Table starts -->

            <tr> <!-- Table row for headers -->
                <th>ID</th> <!-- Header for user ID -->
                <th>Name</th> <!-- Header for user name -->
                <th>Email</th> <!-- Header for user email -->
            </tr> <!-- End of header row -->

            <tr> <!-- First user row -->
                <td>1</td> <!-- User 1 ID -->
                <td>Aman Kumar</td> <!-- User 1 Name -->
                <td>aman@example.com</td> <!-- User 1 Email -->
            </tr> <!-- End of first user row -->

            <tr> <!-- Second user row -->
                <td>2</td> <!-- User 2 ID -->
                <td>Priya Sharma</td> <!-- User 2 Name -->
                <td>priya@example.com</td> <!-- User 2 Email -->
            </tr> <!-- End of second user row -->

            <tr> <!-- Third user row -->
                <td>3</td> <!-- User 3 ID -->
                <td>Rahul Verma</td> <!-- User 3 Name -->
                <td>rahul@example.com</td> <!-- User 3 Email -->
            </tr> <!-- End of third user row -->

        </table> <!-- Table ends -->

    </div> <!-- Container div ends -->

</body> <!-- Body section ends -->
</html> <!-- HTML document ends -->
