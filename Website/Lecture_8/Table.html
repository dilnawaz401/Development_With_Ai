    <title>Table</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>

            <td>John</td> <!-- Column 1 -->
            <td>Doe</td> <!-- Column 2 -->
            <td>john.doe@example.com</td> <!-- Column 3 -->
        </tr>
        <tr> <!-- Row 2 --> go to next line
            <td>aman</td> <!-- Column 1 -->
            <td>kumar</td> <!-- Column 2 -->
            <td>kraman401@example.com</td> <!-- Column 3 -->
        </tr>
    </table>
</body>
</html>
